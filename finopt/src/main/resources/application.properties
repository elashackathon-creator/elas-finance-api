spring.application.name=finopt
spring.threads.virtual.enabled=true

# Banco de dados H2
spring.datasource.url=jdbc:h2:mem:elafinancedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true

# OpenRouter AI (openrouter.ai — modelos gratuitos disponíveis)
groq.api.key=${GROQ_API_KEY:configure-sua-chave}

# JWT
jwt.secret=elafinance-segredo-jwt-dev-substituir-em-producao-2026
jwt.expiracao=86400000

# Logging
logging.level.org.springframework.web=INFO
